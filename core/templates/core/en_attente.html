<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Compte en attente — Bon Berger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f1f5f9; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; max-width: 450px; border-top: 5px solid #f59e0b; }
        .icon { font-size: 50px; color: #f59e0b; margin-bottom: 20px; }
        .btn-retour { display: inline-block; margin-top: 25px; padding: 10px 20px; background: #1e3a8a; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon"><i class="fas fa-clock"></i></div>
        <h2>Accès en attente de validation</h2>
        <p style="color: #64748b; line-height: 1.6; margin-top: 10px;">
            Votre inscription a bien été reçue. Un administrateur (le Préfet) doit maintenant vérifier vos informations et vous attribuer votre rôle officiel avant que vous ne puissiez accéder aux portails.
        </p>
        
        <form action="{% url 'logout' %}" method="POST" style="margin-top: 20px;">
            {% csrf_token %}
            <button type="submit" class="btn-retour" style="border: none; cursor: pointer; width: 100%;">
                <i class="fas fa-sign-out-alt"></i> Se déconnecter et retourner à l'accueil
            </button>
        </form>
    </div>
</body>
</html>
